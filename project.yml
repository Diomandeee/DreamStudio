name: DreamStudio
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    version: "1.17.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    version: "2.0.0"
  OpenClawKit:
    url: https://github.com/Diomandeee/OpenClawKit
    exactVersion: "1.0.2"

settings:
  base:
    SWIFT_VERSION: "5"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  DreamStudio:
    type: application
    platform: iOS
    sources:
      - path: DreamStudio
    resources:
      - path: DreamStudio/Assets.xcassets
    info:
      path: DreamStudio/Info.plist
      properties:
        CFBundleDisplayName: "Dream Studio"
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.dreamstudio
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "8643C988C4"
    developmentTeam: "8643C988C4"
    dependencies:
      - package: ComposableArchitecture
      - package: Supabase
      - package: OpenClawKit
        product: OpenClawCore
      - package: OpenClawKit
        product: OpenClawSupabase

  DreamStudioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DreamStudioTests
    dependencies:
      - target: DreamStudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.dreamstudio.tests
